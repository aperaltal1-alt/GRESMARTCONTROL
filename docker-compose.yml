services:
  postgres:
    image: postgres:16-alpine
    container_name: gre-smart-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: gre_admin
      POSTGRES_PASSWORD: gre_secret_2024
      POSTGRES_DB: gre_smart_control
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gre_admin -d gre_smart_control"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
