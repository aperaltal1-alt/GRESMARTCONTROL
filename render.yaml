# =============================================================================
# Render Blueprint — GRE Smart Control API
# =============================================================================
# Despliega el backend NestJS. La base de datos va en Supabase (externo).
# El frontend se despliega por separado en Vercel.
# =============================================================================

services:
  - type: web
    name: gre-smart-api
    runtime: node
    region: oregon
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:api:prod
    startCommand: npm run start:prod --workspace=apps/api
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: api
      - key: LOG_LEVEL
        value: info
      - key: SWAGGER_ENABLED
        value: "false"
      - key: THROTTLE_TTL
        value: "60000"
      - key: THROTTLE_LIMIT
        value: "100"
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: "10485760"
      # --- Configurar manualmente en Render Dashboard ---
      - key: APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
